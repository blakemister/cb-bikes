services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cbb-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-CBBikes2026!}"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    container_name: cbb-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: ${DB_NAME:-CBBikes}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-CBBikes2026!}
      DB_DRIVER: ${DB_DRIVER:-ODBC Driver 18 for SQL Server}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqldata:
