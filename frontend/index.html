<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB Bikes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#0F1C3F', mid: '#1E3261' },
                        accent: { DEFAULT: '#3B82F6', dark: '#2563EB' },
                        surface: '#F8FAFC',
                        gray: { 50: '#F1F5F9', 100: '#E2E8F0' },
                        text: { primary: '#0F172A', secondary: '#475569', muted: '#94A3B8' },
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444',
                        terminal: { bg: '#0D1117', elevated: '#161B22', border: '#30363D', text: '#C9D1D9' },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="/css/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body
    x-data="app()"
    x-init="init()"
    class="bg-surface font-sans text-text-primary min-h-screen"
>
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-navy z-50 flex items-center justify-between px-6 shadow-lg">
        <div class="flex items-center gap-4">
            <!-- Mobile hamburger -->
            <button
                @click="sidebarOpen = !sidebarOpen"
                class="lg:hidden text-white hover:text-accent transition-colors"
            >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <!-- Brand -->
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke-width="2"/>
                        <circle cx="12" cy="12" r="3" stroke-width="2"/>
                        <path stroke-width="2" d="M12 2v7M12 15v7M2 12h7M15 12h7"/>
                    </svg>
                </div>
                <span class="text-white font-bold text-lg tracking-wide">CB BIKES</span>
                <span class="hidden sm:inline text-text-muted text-xs font-mono ml-2">Database Explorer</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <!-- SQL Console toggle (desktop) -->
            <button
                @click="sqlPanelOpen = !sqlPanelOpen"
                class="hidden lg:flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-mono transition-colors"
                :class="sqlPanelOpen ? 'bg-accent/20 text-accent' : 'bg-white/10 text-white/70 hover:text-white'"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                SQL Console
            </button>
            <!-- Connection status -->
            <div class="flex items-center gap-2">
                <span
                    class="connection-pulse w-2.5 h-2.5 rounded-full"
                    :class="connected ? 'bg-success' : 'bg-danger'"
                ></span>
                <span class="text-xs font-mono" :class="connected ? 'text-success' : 'text-danger'">
                    <span x-text="connected ? 'CONNECTED' : 'OFFLINE'"></span>
                </span>
            </div>
        </div>
    </header>

    <!-- Layout wrapper -->
    <div class="pt-16 flex min-h-screen">
        <!-- Sidebar overlay (mobile) -->
        <div
            x-show="sidebarOpen"
            @click="sidebarOpen = false"
            class="lg:hidden fixed inset-0 bg-black/50 z-30"
            x-transition:enter="transition-opacity duration-200"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
        ></div>

        <!-- Sidebar -->
        <aside
            :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
            class="fixed lg:sticky top-16 left-0 w-64 h-[calc(100vh-4rem)] bg-white border-r border-gray-100 z-40 transition-transform duration-200 flex flex-col overflow-y-auto"
        >
            <nav class="flex-1 p-4 space-y-6">
                <!-- MAIN group -->
                <div>
                    <h3 class="text-[10px] font-semibold uppercase tracking-widest text-text-muted mb-2 px-3">Main</h3>
                    <ul class="space-y-0.5">
                        <template x-for="item in [
                            {id:'dashboard', label:'Dashboard', icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
                            {id:'customers', label:'Customers', icon:'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z'},
                            {id:'products', label:'Products', icon:'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4'},
                            {id:'employees', label:'Employees', icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z'},
                            {id:'sales', label:'Sales', icon:'M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z'}
                        ]" :key="item.id">
                            <li>
                                <a
                                    @click.prevent="navigate(item.id); sidebarOpen = window.innerWidth >= 1024"
                                    :href="'#' + item.id"
                                    class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150"
                                    :class="currentPage === item.id
                                        ? 'bg-accent/10 text-accent'
                                        : 'text-text-secondary hover:bg-gray-50 hover:text-text-primary'"
                                >
                                    <svg class="w-[18px] h-[18px] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" :d="item.icon"/>
                                    </svg>
                                    <span x-text="item.label"></span>
                                </a>
                            </li>
                        </template>
                    </ul>
                </div>

                <!-- JUNIOR BIKE WEEK group -->
                <div>
                    <h3 class="text-[10px] font-semibold uppercase tracking-widest text-text-muted mb-2 px-3">Junior Bike Week</h3>
                    <ul>
                        <li>
                            <a
                                @click.prevent="navigate('bike-week'); sidebarOpen = window.innerWidth >= 1024"
                                href="#bike-week"
                                class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150"
                                :class="currentPage === 'bike-week'
                                    ? 'bg-warning/10 text-warning'
                                    : 'text-text-secondary hover:bg-gray-50 hover:text-text-primary'"
                            >
                                <svg class="w-[18px] h-[18px] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                                </svg>
                                <span>Bike Week</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- INSIGHTS group -->
                <div>
                    <h3 class="text-[10px] font-semibold uppercase tracking-widest text-text-muted mb-2 px-3">Insights</h3>
                    <ul>
                        <li>
                            <a
                                @click.prevent="navigate('reports'); sidebarOpen = window.innerWidth >= 1024"
                                href="#reports"
                                class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150"
                                :class="currentPage === 'reports'
                                    ? 'bg-accent/10 text-accent'
                                    : 'text-text-secondary hover:bg-gray-50 hover:text-text-primary'"
                            >
                                <svg class="w-[18px] h-[18px] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                                </svg>
                                <span>Reports</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- DATABASE group -->
                <div>
                    <h3 class="text-[10px] font-semibold uppercase tracking-widest text-text-muted mb-2 px-3">Database</h3>
                    <ul>
                        <li>
                            <a
                                @click.prevent="navigate('schema'); sidebarOpen = window.innerWidth >= 1024"
                                href="#schema"
                                class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150"
                                :class="currentPage === 'schema'
                                    ? 'bg-accent/10 text-accent'
                                    : 'text-text-secondary hover:bg-gray-50 hover:text-text-primary'"
                            >
                                <svg class="w-[18px] h-[18px] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
                                </svg>
                                <span>Schema Viewer</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Session Stats -->
            <div class="p-4 border-t border-gray-100">
                <h3 class="text-[10px] font-semibold uppercase tracking-widest text-text-muted mb-3">Session Stats</h3>
                <div class="space-y-2 text-xs font-mono">
                    <div class="flex justify-between items-center">
                        <span class="text-text-secondary">Queries</span>
                        <span class="text-text-primary font-semibold" x-text="stats.queries"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-text-secondary">Total Time</span>
                        <span class="text-text-primary font-semibold" x-text="stats.totalMs.toFixed(0) + ' ms'"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-text-secondary">Errors</span>
                        <span :class="stats.errors > 0 ? 'text-danger font-semibold' : 'text-text-primary font-semibold'" x-text="stats.errors"></span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main content area -->
        <main
            class="flex-1 min-w-0 transition-all duration-200"
            :class="sqlPanelOpen ? 'lg:mr-[360px]' : ''"
        >
            <div class="max-w-[1200px] mx-auto p-6">
                <div id="page-content">
                    <div class="loading-spinner-container">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- SQL Console Panel -->
        <div
            x-show="sqlPanelOpen"
            x-transition:enter="transition-transform duration-200"
            x-transition:enter-start="translate-x-full"
            x-transition:enter-end="translate-x-0"
            x-transition:leave="transition-transform duration-200"
            x-transition:leave-start="translate-x-0"
            x-transition:leave-end="translate-x-full"
            class="fixed top-16 right-0 w-[360px] h-[calc(100vh-4rem)] bg-terminal-bg border-l border-terminal-border z-20 flex flex-col"
        >
            <!-- Console header -->
            <div class="flex items-center justify-between px-4 py-3 border-b border-terminal-border bg-terminal-elevated">
                <div class="flex items-center gap-2">
                    <div class="flex gap-1.5">
                        <span class="w-3 h-3 rounded-full bg-[#FF5F56]"></span>
                        <span class="w-3 h-3 rounded-full bg-[#FFBD2E]"></span>
                        <span class="w-3 h-3 rounded-full bg-[#27C93F]"></span>
                    </div>
                    <span class="text-terminal-text text-xs font-mono ml-2">SQL Console</span>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        @click="clearSqlLog()"
                        class="text-text-muted hover:text-terminal-text text-xs font-mono transition-colors"
                        title="Clear log"
                    >
                        Clear
                    </button>
                    <button
                        @click="sqlPanelOpen = false"
                        class="text-text-muted hover:text-terminal-text transition-colors"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- Console entries -->
            <div id="sql-log-entries" class="flex-1 overflow-y-auto sql-console-scroll p-3 space-y-2">
                <!-- SQL log entries injected here by sql-console.js -->
                <div class="text-center text-text-muted text-xs font-mono py-8">
                    <svg class="w-8 h-8 mx-auto mb-2 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    Waiting for queries...
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] space-y-2"></div>

    <!-- Mobile SQL Console toggle -->
    <button
        @click="sqlPanelOpen = !sqlPanelOpen"
        class="lg:hidden fixed bottom-6 left-6 z-50 w-12 h-12 rounded-full bg-navy text-white shadow-xl flex items-center justify-center hover:bg-navy-mid transition-colors"
    >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
    </button>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/sql-console.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/customers.js"></script>
    <script src="/js/pages/products.js"></script>
    <script src="/js/pages/employees.js"></script>
    <script src="/js/pages/sales.js"></script>
    <script src="/js/pages/bike-week.js"></script>
    <script src="/js/pages/reports.js"></script>
    <script src="/js/pages/schema.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
